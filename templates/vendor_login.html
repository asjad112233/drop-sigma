<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Login — Drop Sigma</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.login-card{background:#fff;border-radius:28px;width:100%;max-width:420px;padding:44px 40px;box-shadow:0 40px 100px rgba(0,0,0,.35);}

.brand{display:flex;align-items:center;gap:14px;margin-bottom:36px;}
.brand-icon{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,#35cfff,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:950;font-size:14px;color:#06101f;letter-spacing:-.5px;flex-shrink:0;}
.brand-text h1{font-size:20px;font-weight:900;color:#0f172a;line-height:1;}
.brand-text p{font-size:12px;color:#64748b;margin-top:3px;}

.login-title{font-size:24px;font-weight:900;color:#0f172a;margin-bottom:6px;}
.login-sub{font-size:13px;color:#64748b;margin-bottom:28px;}

label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
input[type="email"],input[type="password"]{width:100%;padding:13px 16px;border:1.5px solid #e2e8f0;border-radius:14px;font-size:14px;font-weight:600;color:#0f172a;background:#f8fafc;transition:.15s;outline:none;margin-bottom:18px;}
input:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.12);}

.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;transition:.15s;margin-top:4px;}
.btn-login:hover{background:linear-gradient(135deg,#1d4ed8,#1e40af);transform:translateY(-1px);box-shadow:0 8px 24px rgba(37,99,235,.35);}
.btn-login:active{transform:translateY(0);}

.error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:600;color:#dc2626;margin-bottom:20px;}

.footer-note{text-align:center;font-size:12px;color:#94a3b8;margin-top:24px;}
.footer-note a{color:#2563eb;text-decoration:none;font-weight:700;}
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon">DS</div>
    <div class="brand-text">
      <h1>Drop Sigma</h1>
      <p>Vendor Portal</p>
    </div>
  </div>

  <h2 class="login-title">Vendor Login</h2>
  <p class="login-sub">Sign in to access your assigned orders and submit tracking.</p>

  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/vendor/login/">
    {% csrf_token %}
    <label>Email Address</label>
    <input type="email" name="email" placeholder="vendor@email.com" required autofocus>
    <label>Password</label>
    <input type="password" name="password" placeholder="Your password" required>
    <button type="submit" class="btn-login">Sign In →</button>
  </form>

  <p class="footer-note">Issues logging in? Contact your <a href="/">admin</a>.</p>
</div>

</body>
</html>
